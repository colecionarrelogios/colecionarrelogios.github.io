<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <link href="https://fonts.googleapis.com/css2?family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contato | Colecionar Relógios</title>
  <style>
    :root {
      --bg: #f8f8f6;
      --surface: #ffffff;
      --text: #1e2430;
      --muted: #5e6878;
      --line: #d9deea;
      --accent: #204a87;
      --shadow: 0 16px 50px rgba(18, 32, 56, 0.08);
      --radius: 24px;
      --container: 900px;
    }

    body {
      margin: 0;
      font-family: 'Lora', serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      width: min(100% - 40px, var(--container));
      margin: 0 auto;
    }

    .site-header {
      position: sticky;
      top: 0;
      background: rgba(248,248,246,0.95);
      border-bottom: 1px solid rgba(32,74,135,0.08);
    }

    .header-inner {
      display: flex;
      justify-content: space-between;
      align-items: center;
      min-height: 80px;
    }

    .brand-name {
      font-size: 1.5rem;
      font-weight: 700;
    }

    .hero {
      padding: 80px 0 40px;
    }

    h1 {
      font-size: 2.8rem;
      margin-bottom: 20px;
    }

    p {
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1.7;
    }

    .cta {
      margin-top: 30px;
    }

    .button {
      display: inline-block;
      padding: 14px 22px;
      border-radius: 999px;
      background: var(--accent);
      color: #fff;
      text-decoration: none;
      font-weight: 700;
    }

    .footer {
      margin-top: 80px;
      padding: 30px 0;
      border-top: 1px solid var(--line);
    }

    .footer-inner {
      display: flex;
      justify-content: space-between;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<header class="site-header">
  <div class="container header-inner">
    <a href="index.html" class="brand-name">Colecionar Relógios</a>
  </div>
</header>

<main>
  <section class="hero">
    <div class="container">
      <h1>Contato</h1>
      <p>Entre em contato para compra, venda, intermediação ou avaliação de relógios. Atendimento direto, sem burocracia.</p>

      <div class="cta">
        <a class="button" href="https://wa.me/551152950377?text=Ol%C3%A1%2C%20gostaria%20de%20falar%20sobre%20rel%C3%B3gios" target="_blank">
          Falar no WhatsApp
        </a>
      </div>

      <p style="margin-top:30px">Instagram: @colecionar_relogios</p>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="container footer-inner">
    <span>© 2026 Colecionar Relógios LTDA</span>
    <span>CNPJ 59.378.775/0001-48</span>
  </div>
</footer>

</body>
</html>
